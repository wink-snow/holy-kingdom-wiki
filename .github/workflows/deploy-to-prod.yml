name: Build and Deploy to Prod Branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy-to-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 

      - name: Set up Node.js
        uses: actions/setup-node@v4 
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up npm registry
        run: pnpm config set registry https://registry.npmmirror.com/

      - name: Clean pnpm store
        run: pnpm store prune

      - name: Install Dependencies(Recreate Lockfile)
        run: rm pnpm-lock.yaml && pnpm install

      # - name: Install Dependencies
      #  run: pnpm install --frozen-lockfile --child-concurrency=1 --loglevel debug

      - name: Build Project
        run: pnpm run build

      - name: Deploy to Prod Branch
        uses: peaceiris/actions-gh-pages@v3
        with: 
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: prod
          commit_message: "Deploy: ${{ github.event.head_commit.message }}"
          force_orphan: true